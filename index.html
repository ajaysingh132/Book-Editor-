<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Generator</title>

<style>
body {
  font-family: Arial;
  text-align: center;
}

#cover {
  width: 300px;
  height: 450px;
  background: linear-gradient(black, gray);
  color: white;
  margin: 20px auto;
  padding: 20px;
  display: block;
}

button {
  margin: 5px;
  padding: 10px;
}
</style>
</head>

<body>

<h2>📘 Book Cover Generator</h2>

<input id="title" placeholder="Book Title"><br><br>
<input id="author" placeholder="Author Name"><br><br>

<button onclick="generate()">Generate</button>
<button onclick="downloadImage()">Download PNG</button>
<button onclick="downloadPDF()">Download PDF</button>

<div id="cover">
  <h2 id="t">Your Title</h2>
  <p id="a">Author Name</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
function generate() {
  let title = document.getElementById("title").value;
  let author = document.getElementById("author").value;

  document.getElementById("t").innerText = title || "Sample Title";
  document.getElementById("a").innerText = author || "Author Name";
}

function downloadImage() {
  html2canvas(document.getElementById("cover")).then(canvas => {
    let link = document.createElement("a");
    link.download = "cover.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

async function downloadPDF() {
  const { jsPDF } = window.jspdf;
  let pdf = new jsPDF();

  await html2canvas(document.getElementById("cover")).then(canvas => {
    let img = canvas.toDataURL("image/png");
    pdf.addImage(img, 'PNG', 10, 10, 180, 260);
  });

  pdf.save("book.pdf");
}
</script>

</body>
</html>
